<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>📚 Book Swipe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500&display=swap"
        rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header><h1>📚 Book Swipe</h1></header>

  <div id="modes" hidden>
    <button id="mode-swipe" class="mode active">🃏 Swipe</button>
    <button id="mode-chat" class="mode">💬 Ask AI</button>
  </div>

  <section id="onboarding">
    <p class="lede">Add a few books you love, then start swiping.</p>
    <input id="search" type="text" placeholder="Search a book…" autocomplete="off" />
    <ul id="results"></ul>
    <div id="seeds"></div>

    <div class="panel">
      <div class="field">
        <label for="user">Load saved reader</label>
        <select id="user"><option value="">— none —</option></select>
      </div>
      <div class="field">
        <label for="method">Recommender model</label>
        <select id="method"></select>
      </div>
      <div class="field">
        <label for="save-name">Save these picks as a reader</label>
        <div class="save-row">
          <input id="save-name" type="text" placeholder="name this reader…" autocomplete="off" />
          <button id="save-user" class="ghost">Save</button>
        </div>
      </div>
    </div>

    <button id="start" class="primary" disabled>Start swiping →</button>
  </section>

  <div id="stage" hidden>
    <aside id="swipe-side">
      <div class="side-card" id="reader-card">
        <h3>👤 <span id="reader-name">Your picks</span></h3>
        <div class="model-badge">🧠 <span id="reader-model">—</span></div>
        <h4>📖 Reading history <span id="hist-count" class="pill">0</span></h4>
        <ul id="reader-history"></ul>
      </div>
      <div class="side-card" id="reading-list">
        <h3>🔖 Reading list <span id="rl-count" class="pill">0</span></h3>
        <ul></ul>
      </div>
    </aside>

    <div id="center">
      <section id="swipe">
        <article id="card">
          <div class="stamp stamp-like">LIKED</div>
          <div class="stamp stamp-want">WANT</div>
          <div class="stamp stamp-nope">NOPE</div>
          <div class="card-body"></div>
        </article>
      </section>

      <section id="chat" hidden>
        <div class="chat-row">
          <input id="chat-input" type="text" autocomplete="off"
                 placeholder="e.g. books about WWII like Band of Brothers" />
          <button id="chat-send" class="primary">Ask</button>
        </div>
        <label class="use-books"><input type="checkbox" id="use-books" /> Use my books for context</label>
        <div id="steer-state" class="steer-state" hidden></div>
        <div id="chat-output"></div>
      </section>
    </div>
  </div>

  <nav id="actions" hidden>
    <button class="act act-nope" data-action="dislike" title="Not for me">✗</button>
    <button class="act act-skip" data-action="skip" title="Skip">⏭</button>
    <button class="act act-want" data-action="want" title="Want to read (→)">🔖</button>
    <button class="act act-like" data-action="like" title="Read &amp; liked (←)">♥</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
